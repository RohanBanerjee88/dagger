# Phase 1 -- 3-speaker proposed-vs-blind comparison (CLAUDE.md §5 Phase 1:
# "on 3+ speakers your method holds up while the blind baseline visibly merges
# speakers"). Must be LibriMix, not WSJ0-2mix: wsj0mix.py's mix_2_spk_*.txt
# lines are structurally 2-pair, so n_src: 3 there would silently truncate
# rather than produce a real 3-speaker mixture. Training split.

sample_rate: 8000
fade_ms: 5

dataset:
  name: librimix
  metadata: metadata/Libri3Mix/libri3mix_train-360.csv   # under DAGGER_DATA_ROOT
  n_src: 3
  overlap: 0.5
  limit: null   # full training split

enroll:
  k: 3
  min_clip_ms: 500.0

extractor:
  hidden_channels: 64
  n_blocks: 6
  n_fft: 256
  hop_length: 64
  n_heads: 4
  n_tokens: 8
  cross_attn_blocks: 6   # fuse before every block (conditioning-collapse fix)
  num_speakers: 3   # blind baseline only; proposed extractor ignores this

train:
  system: proposed        # run once with proposed, once with blind
  epochs: 100
  batch_size: 8
  segment_seconds: 4.0
  lr: 0.001
  checkpoint_out: checkpoints/phase1/proposed_librimix_3spk.pt
