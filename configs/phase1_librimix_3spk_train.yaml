# Phase 1 -- 3-speaker proposed-vs-blind comparison (CLAUDE.md §5 Phase 1:
# "on 3+ speakers your method holds up while the blind baseline visibly merges
# speakers"). Must be LibriMix, not WSJ0-2mix: wsj0mix.py's mix_2_spk_*.txt
# lines are structurally 2-pair, so n_src: 3 there would silently truncate
# rather than produce a real 3-speaker mixture. Training split.

sample_rate: 8000
fade_ms: 5

dataset:
  name: librimix
  metadata: metadata/Libri3Mix/libri3mix_train-360.csv   # under DAGGER_DATA_ROOT
  n_src: 3
  overlap: 0.5
  limit: 2000   # sized for one Kaggle T4 batch session (~7 h with prep); full 50k split doesn't fit

enroll:
  k: 3
  min_clip_ms: 500.0

extractor:
  hidden_channels: 64
  n_blocks: 6
  n_fft: 256
  hop_length: 64
  n_heads: 4
  n_tokens: 8
  cross_attn_blocks: 6   # fuse before every block (conditioning-collapse fix)
  num_speakers: 3   # blind baseline only; proposed extractor ignores this

train:
  system: proposed        # run once with proposed, once with blind
  epochs: 30
  batch_size: 4     # batch 8 OOMs a 15 GB T4 with per-speaker backward
  segment_seconds: 4.0
  lr: 0.0003        # 1e-3 never escaped the passthrough plateau (overfit-4 diagnostic, 2026-07-12)
  grad_clip: 10.0   # max grad norm; null disables. 5.0 blanket-rescaled 93-99% of late-run
                    # steps once healthy medians hit ~10; 10.0 frees those while still cutting
                    # the 150-370 spikes. Validate via the per-epoch grad_norm log line.
  checkpoint_every: 5   # overwriting mid-run saves; insurance for long sessions
  checkpoint_out: checkpoints/phase1/proposed_librimix_3spk.pt
