sample_rate: 8000
fade_ms: 5

dataset:
  name: librimix
  metadata: metadata/Libri3Mix/libri3mix_test.csv
  n_src: 3
  placement: scheduled   # Phase 2 scene scheduler: guaranteed per-speaker solo
                         # + a synchronized deep-overlap zone (depth up to n_src)
  min_solo_ms: 1000.0
  limit: 150

enroll:
  k: 3
  min_clip_ms: 500.0

extractor:
  hidden_channels: 64
  n_blocks: 6
  n_fft: 256
  hop_length: 64
  n_heads: 4
  n_tokens: 8
  cross_attn_blocks: 6
  num_speakers: 3
  # Reuses the Phase 1 checkpoint unchanged -- Phase 2 is a different
  # inference-time wiring of the same trained G, not a new architecture.
  checkpoint: checkpoints/phase1/proposed_librimix_3spk.pt

gate:
  tau_margin: 0.1
  max_mean_variance: 0.05
  min_vad_coverage: 0.5
  max_artifact_score: 0.9

refine:
  rounds: 2

eval:
  results_dir: results
