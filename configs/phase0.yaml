# Phase 0 — plumbing, oracle diarization, no learning yet (CLAUDE.md §5).
#
# No real corpus is wired up yet, so this config drives a self-contained
# synthetic scene: a few pure tones, each active over ground-truth spans, mixed
# to one channel. It exercises the whole path (mixture -> oracle regions ->
# copied-solo output -> SI-SDR) end to end. Swapping in WSJ0-2mix / LibriMix
# loaders is the remaining Phase 0 work.

sample_rate: 8000        # dev rate for WSJ0/LibriMix (CLAUDE.md §7)
fade_ms: 5               # crossfade half-width at solo<->overlap seams

scene:
  duration: 3.0          # seconds
  speakers:
    - name: spkA
      freq: 220.0        # Hz
      segments: [[0.0, 1.6]]
    - name: spkB
      freq: 300.0
      segments: [[1.0, 1.6]]   # overlaps spkA in [1.0, 1.6)
    - name: spkC
      freq: 410.0
      segments: [[2.2, 0.8]]
