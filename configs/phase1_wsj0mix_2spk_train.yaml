# Phase 1 -- 2-speaker literature-bar check (CLAUDE.md §5 Phase 1: "on 2-speaker
# clean data you approach the literature bar, ~23 dB SI-SDR on WSJ0-2mix").
# Training split.

sample_rate: 8000
fade_ms: 5

dataset:
  name: wsj0mix
  metadata: metadata/wsj0-2mix/mix_2_spk_tr.txt   # under DAGGER_DATA_ROOT
  n_src: 2
  overlap: 0.5
  limit: null   # full training split

enroll:
  k: 3
  min_clip_ms: 500.0

extractor:
  hidden_channels: 64
  n_blocks: 6
  n_fft: 256
  hop_length: 64
  n_heads: 4
  n_tokens: 4
  cross_attn_blocks: 1

train:
  system: proposed
  epochs: 100
  batch_size: 8
  segment_seconds: 4.0
  lr: 0.001
  checkpoint_out: checkpoints/phase1/proposed_wsj0mix_2spk.pt
