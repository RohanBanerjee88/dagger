# Phase 1 -- 3-speaker proposed-vs-blind comparison (CLAUDE.md §5 Phase 1). Eval split.

sample_rate: 8000
fade_ms: 5

dataset:
  name: librimix
  metadata: metadata/Libri3Mix/libri3mix_test.csv   # under DAGGER_DATA_ROOT
  n_src: 3
  overlap: 0.5
  limit: 150   # DoD table: blind seed variance was ~1.2 dB on 50 scenes; 450 paired rows tighten the mean

enroll:
  k: 3
  min_clip_ms: 500.0

extractor:
  hidden_channels: 64
  n_blocks: 6
  n_fft: 256
  hop_length: 64
  n_heads: 4
  n_tokens: 8
  cross_attn_blocks: 6   # must match the train config's architecture
  num_speakers: 3
  checkpoint: checkpoints/phase1/proposed_librimix_3spk.pt
  blind_checkpoint: checkpoints/phase1/blind_librimix_3spk.pt

eval:
  results_dir: results
